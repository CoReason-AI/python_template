{% raw %}
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.14'
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd

  test-ubuntu:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14", "3.14t"]
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  test-extended:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.14", "3.14t"]
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Build wheel
        run: uv build
        shell: bash
      - name: Verify SHA256
        run: sha256sum dist/*.whl
        shell: bash
{% endraw %}
